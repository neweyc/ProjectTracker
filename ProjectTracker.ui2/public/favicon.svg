<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#7c3aed"/>
  <!-- Receipt body -->
  <rect x="8" y="5" width="16" height="20" rx="1.5" fill="white" opacity="0.15"/>
  <rect x="8" y="5" width="16" height="20" rx="1.5" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Lines -->
  <line x1="11" y1="10" x2="21" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="13.5" x2="21" y2="13.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="17" x2="17" y2="17" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Zigzag bottom -->
  <polyline points="8,25 10,23 12,25 14,23 16,25 18,23 20,25 22,23 24,25" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
