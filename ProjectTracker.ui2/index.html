<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Olive Invoice — Invoicing, Time Tracking & Kanban for Freelancers</title>
    <meta name="description" content="Olive Invoice combines Kanban project planning, one-click time tracking, and professional invoicing in one workspace. Built for freelancers and small teams." />
    <link rel="canonical" href="https://oliveinvoice.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://oliveinvoice.com" />
    <meta property="og:title" content="Olive Invoice — Invoicing, Time Tracking & Kanban for Freelancers" />
    <meta property="og:description" content="Stop juggling spreadsheets and disparate tools. Olive Invoice combines Kanban planning, automated time tracking, and professional invoicing in one beautiful workspace." />
    <meta property="og:image" content="https://oliveinvoice.com/og-image.png" />
    <meta property="og:site_name" content="Olive Invoice" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Olive Invoice — Invoicing, Time Tracking & Kanban for Freelancers" />
    <meta name="twitter:description" content="Stop juggling spreadsheets and disparate tools. Olive Invoice combines Kanban planning, automated time tracking, and professional invoicing in one beautiful workspace." />
    <meta name="twitter:image" content="https://oliveinvoice.com/og-image.png" />

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Olive Invoice",
      "url": "https://oliveinvoice.com",
      "description": "Olive Invoice combines Kanban project planning, one-click time tracking, and professional invoicing in one workspace. Built for freelancers and small teams.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Solo",
          "price": "9.00",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "billingDuration": "P1M"
          }
        },
        {
          "@type": "Offer",
          "name": "Team",
          "price": "29.00",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "billingDuration": "P1M"
          }
        }
      ],
      "featureList": [
        "Kanban project boards",
        "One-click time tracking",
        "Professional PDF invoicing",
        "Automated tax calculations",
        "Team collaboration",
        "Stripe payment integration"
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
