services:
  api:
    image: neweyc/olive-api:latest
    platform: linux/amd64
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "${DB_CONNECTION_STRING}"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY}"
      Stripe__SoloPriceId: "${STRIPE_SOLO_PRICE_ID}"
      Stripe__TeamPriceId: "${STRIPE_TEAM_PRICE_ID}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET}"

  ui:
    image: neweyc/olive-ui:latest
    platform: linux/amd64
    depends_on:
      - api

  craytech-ui:
    image: neweyc/craytech.ui:latest
    platform: linux/amd64

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ui
      - api
      - craytech-ui

volumes:
  caddy_data:
  caddy_config:
