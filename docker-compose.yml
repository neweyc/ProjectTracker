services:
  db:
    build: ./Database
    environment:
      POSTGRES_DB: projecttracker
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d projecttracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./ProjectTracker.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=projecttracker;Username=app_user;Password=changeme"
    ports:
      - "5260:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
